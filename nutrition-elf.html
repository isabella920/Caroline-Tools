    <style>
        body { background-color: #FDFBF7; } /* 米色背景，比較溫潤 */
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    </style>
</head>
<body class="min-h-screen p-4 md:flex md:items-center md:justify-center">

    <div class="max-w-md w-full space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-emerald-800 flex items-center justify-center gap-2">
                <i data-lucide="sparkles" class="text-emerald-500"></i> 營養小精靈
            </h1>
            <p class="text-gray-500 text-sm">拍照上傳，讓小精靈翻譯成分表給妳聽</p>
        </header>

        <div id="dropzone" class="border-2 border-dashed border-emerald-300 rounded-2xl p-8 text-center glass-card hover:border-emerald-500 transition-all cursor-pointer">
            <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
            <div id="uploadPrompt">
                <i data-lucide="camera" class="w-12 h-12 mx-auto text-emerald-400 mb-2"></i>
                <p class="text-emerald-700 font-medium">點擊或拖放包裝照片</p>
                <p class="text-xs text-gray-400 mt-1">支援多張照片同步分析</p>
            </div>
            <div id="previewContainer" class="flex flex-wrap gap-2 mt-4 hidden"></div>
        </div>

        <button id="analyzeBtn" class="w-full emerald-gradient text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-transform disabled:opacity-50">
            開始 AI 智慧分析
        </button>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="text-emerald-600 mt-4 font-medium animate-pulse">精靈正在讀取標籤中...</p>
            <p class="text-xs text-gray-400">正在尋找隱藏的熱量地雷...</p>
        </div>

        <div id="resultCard" class="hidden space-y-4">
            <div class="glass-card rounded-2xl p-6 shadow-xl border border-white">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="prodName" class="text-xl font-bold text-gray-800">產品名稱</h2>
                    <span id="verdictBadge" class="px-3 py-1 rounded-full text-xs font-bold text-white">評級</span>
                </div>
                
                <p id="verdictText" class="text-gray-600 italic mb-6 border-l-4 border-emerald-400 pl-3">"精靈的一句話短評"</p>

                <div id="highlights" class="grid grid-cols-2 gap-3 mb-6">
                    </div>

                <div class="space-y-4">
                    <h3 class="font-bold text-gray-700 flex items-center gap-2">
                        <i data-lucide="languages" class="w-4 h-4"></i> 成分翻譯機
                    </h3>
                    <div id="translations" class="text-sm space-y-2 bg-white/50 p-3 rounded-lg"></div>
                </div>

                <div class="mt-6 pt-6 border-t border-gray-100 space-y-2">
                    <p id="adviceTarget" class="text-sm font-bold text-emerald-700"></p>
                    <p id="adviceWarning" class="text-sm text-red-500"></p>
                </div>
            </div>
            
            <button onclick="window.location.reload()" class="w-full text-gray-400 text-sm py-2">重新掃描下一個</button>
        </div>
    </div>
