<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營養小精靈 Nutrition Elf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #FDFBF7; } /* 米色背景，比較溫潤 */
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    </style>
</head>
<body class="min-h-screen p-4 md:flex md:items-center md:justify-center">

    <div class="max-w-md w-full space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-emerald-800 flex items-center justify-center gap-2">
                <i data-lucide="sparkles" class="text-emerald-500"></i> 營養小精靈
            </h1>
            <p class="text-gray-500 text-sm">拍照上傳，讓小精靈翻譯成分表給妳聽</p>
        </header>

        <div id="dropzone" class="border-2 border-dashed border-emerald-300 rounded-2xl p-8 text-center glass-card hover:border-emerald-500 transition-all cursor-pointer">
            <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
            <div id="uploadPrompt">
                <i data-lucide="camera" class="w-12 h-12 mx-auto text-emerald-400 mb-2"></i>
                <p class="text-emerald-700 font-medium">點擊或拖放包裝照片</p>
                <p class="text-xs text-gray-400 mt-1">支援多張照片同步分析</p>
            </div>
            <div id="previewContainer" class="flex flex-wrap gap-2 mt-4 hidden"></div>
        </div>

        <button id="analyzeBtn" class="w-full emerald-gradient text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-transform disabled:opacity-50">
            開始 AI 智慧分析
        </button>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="text-emerald-600 mt-4 font-medium animate-pulse">精靈正在讀取標籤中...</p>
            <p class="text-xs text-gray-400">正在尋找隱藏的熱量地雷...</p>
        </div>

        <div id="resultCard" class="hidden space-y-4">
            <div class="glass-card rounded-2xl p-6 shadow-xl border border-white">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="prodName" class="text-xl font-bold text-gray-800">產品名稱</h2>
                    <span id="verdictBadge" class="px-3 py-1 rounded-full text-xs font-bold text-white">評級</span>
                </div>
                
                <p id="verdictText" class="text-gray-600 italic mb-6 border-l-4 border-emerald-400 pl-3">"精靈的一句話短評"</p>

                <div id="highlights" class="grid grid-cols-2 gap-3 mb-6">
                    </div>

                <div class="space-y-4">
                    <h3 class="font-bold text-gray-700 flex items-center gap-2">
                        <i data-lucide="languages" class="w-4 h-4"></i> 成分翻譯機
                    </h3>
                    <div id="translations" class="text-sm space-y-2 bg-white/50 p-3 rounded-lg"></div>
                </div>

                <div class="mt-6 pt-6 border-t border-gray-100 space-y-2">
                    <p id="adviceTarget" class="text-sm font-bold text-emerald-700"></p>
                    <p id="adviceWarning" class="text-sm text-red-500"></p>
                </div>
            </div>
            
            <button onclick="window.location.reload()" class="w-full text-gray-400 text-sm py-2">重新掃描下一個</button>
        </div>
    </div>

    <script>
        // 初始化圖示
        lucide.createIcons();

// --- 核心升級區：隱身防護版 ---
// 這裡指定最強的 Pro 模型
const MODEL_NAME = 'gemini-3-flash-preview'; 

// 第一步：把你的 API Key 前半段貼在第一個引號，後半段貼在第二個引號
const _p1 = 'AIzaSyBn9KLom3WaUPe'; 
const _p2 = '-CHdGiBV6OR4BoOaeBl4'; 

// 第二步：這裡會自動組合，不需要動它
const API_KEY = _p1 + _p2;

// 第三步：自動組裝請求網址
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
// -----------------

        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const previewContainer = document.getElementById('previewContainer');

        // 點擊上傳邏輯
        dropzone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            previewContainer.innerHTML = '';
            previewContainer.classList.remove('hidden');
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.className = "w-16 h-16 object-cover rounded-md shadow-sm border border-white";
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        };

// 核心分析邏輯 (智慧偵測 + 犀利小精靈原版指令)
        analyzeBtn.onclick = async () => {
            const files = fileInput.files;
            if (files.length === 0) return alert('請先上傳照片喔！');

            // 顯示載入中，隱藏按鈕
            document.getElementById('loading').classList.remove('hidden');
            analyzeBtn.classList.add('hidden');
            dropzone.classList.add('hidden');

            try {
                // 1. 將圖片轉換為 Base64 (拼圖邏輯)
                const imageParts = await Promise.all(
                    Array.from(files).map(async (file) => {
                        const base64 = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result.split(',')[1]);
                            reader.readAsDataURL(file);
                        });
                        return { inlineData: { mimeType: file.type, data: base64 } };
                    })
                );

                // 2. 🔥 你的犀利指令 (完整回歸！)
                const prompt = `# 核心設定與生圖參數 (供 UI 背景或視覺呈現參考)
Visual_Style: "Modern Infographic / High-Contrast Neon"
Lighting: "Soft Backlit (for food texture)"
Constraints: 
  - "Strict JSON output only"
  - "No Markdown code blocks (outside the JSON)"
  - "Tone: Witty, slightly sarcastic, yet empathetic to foodies"
---
# 任務邏輯與內容 (Markdown 格式)
你是一位精通食品科學的「毒舌營養吃貨小精靈」。你存在的目的不是叫人「不准吃」，而是揭穿食品標籤上的偽裝，讓追求健康卻又割捨不了美食的普通民眾（受眾），能明明白白地「墮落」。

請深度分析圖片中的成分表，特別針對「人工色素」、「防腐劑」、「甜味劑」及「反式脂肪」進行掃描。

輸出格式請嚴格遵守純 JSON（禁止包含 Markdown 標籤）：
{
  "productName": "產品名稱",
  "verdict": { 
    "title": "針對吃貨心態的一句話精闢吐槽（例如：這是實驗室產物，不是食物）", 
    "color": "green (安心吃) | yellow (考慮一下) | red (放下它)" 
  },
  "highlights": [
    { "label": "邪惡係數", "value": "0-10", "desc": "添加劑與加工程度的綜合評價", "type": "bad" },
    { "label": "熱量地雷", "value": "XXX kcal", "desc": "以運動量為比喻（例如：要跑 5 公里）", "type": "bad" }
  ],
  "translations": [
    { 
      "origin": "化學成分原名", 
      "simplified": "白話名稱", 
      "impact": "對身體或味覺的實際影響（例如：讓你的大腦對甜味麻木）" 
    }
  ],
  "advice": { 
    "warning": "這罐東西裡最違背天良的成分是什麼", 
    "action": "如果真的忍不住吃了，當天該如何補救（例如：多喝 1000cc 水或補充維他命 C）",
    "craving_swap": "給吃貨的靈魂建議：下次想吃這個時，有沒有更健康的美味替代品？"
  }
}`;

                // 3. 送出請求
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...imageParts] }] })
                });

                const data = await response.json();

                // 4. 🚨 智慧偵測：檢查 API 是否壞掉
                if (data.error) {
                    let errorMsg = "🛑 偵測到問題：";
                    const code = data.error.code;
                    if (code === 404) errorMsg += `\n【模型名稱錯誤】目前的「${MODEL_NAME}」可能已過期。`;
                    else if (code === 403) errorMsg += `\n【API Key 失敗】請檢查 Key 是否拆分正確。`;
                    else if (data.error.message.includes('quota')) errorMsg += `\n【額度用完】明天再試或換個 Key。`;
                    else errorMsg += `\n原因：${data.error.message}`;
                    throw new Error(errorMsg);
                }

                // 5. 解析並渲染結果
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                renderResult(result);

            } catch (error) {
                alert(error.message);
                window.location.reload(); // 出錯就刷新，讓按鈕回來
            }
        };

function renderResult(res) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('resultCard').classList.remove('hidden');

    // 1. 產品名與評級
    document.getElementById('prodName').innerText = res.productName;
    document.getElementById('verdictText').innerText = `"${res.verdict.title}"`;
    
    const badge = document.getElementById('verdictBadge');
    const colors = { 
        green: 'bg-emerald-500', 
        yellow: 'bg-amber-500', 
        red: 'bg-red-500' 
    };
    // 取得顏色名稱 (處理 green (安心吃) 這種字串)
    const colorKey = res.verdict.color.split(' ')[0].toLowerCase();
    badge.className = `px-3 py-1 rounded-full text-xs font-bold text-white ${colors[colorKey] || 'bg-gray-500'}`;
    badge.innerText = colorKey.toUpperCase();

    // 2. 亮點區
    document.getElementById('highlights').innerHTML = res.highlights.map(h => `
        <div class="bg-white/60 p-3 rounded-xl border border-white">
            <p class="text-[10px] text-gray-400 font-bold uppercase">${h.label}</p>
            <p class="text-lg font-black text-emerald-800">${h.value}</p>
            <p class="text-[9px] text-gray-500">${h.desc}</p>
        </div>
    `).join('');

    // 3. 成分翻譯區
    document.getElementById('translations').innerHTML = res.translations.map(t => `
        <div class="border-b border-emerald-100 last:border-0 pb-2 mb-2">
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-mono text-gray-400">${t.origin}</span>
                <span class="font-bold text-gray-700">➜ ${t.simplified}</span>
            </div>
            <p class="text-xs text-emerald-600 mt-1 italic leading-tight">${t.impact}</p>
        </div>
    `).join('');

    // 4. 建議區
    document.getElementById('adviceTarget').innerHTML = `💡 靈魂替代：${res.advice.craving_swap}`;
    document.getElementById('adviceWarning').innerHTML = `⚠️ 補救動作：${res.advice.action}`;
    
    lucide.createIcons();
}
    </script>
    <div style="position: fixed; bottom: 5px; left: 10px; font-size: 10px; color: #cbd5e1; font-family: monospace; pointer-events: none; opacity: 0.5;">
    v1.0.2
</div>
</body>
</html>
