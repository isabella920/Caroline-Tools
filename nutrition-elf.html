<body class="min-h-screen p-4 md:flex md:items-center md:justify-center">

<body class="min-h-screen p-4 md:p-10 flex items-center justify-center"> <div class="max-w-4xl w-full space-y-8"> 
        <header class="text-center space-y-4">
            <h1 class="text-3xl md:text-5xl font-extrabold text-emerald-800 flex items-center justify-center gap-3">
                <i data-lucide="sparkles" class="text-emerald-500 w-8 h-8"></i> 營養小精靈

            <p class="text-gray-500 text-lg">拍照上傳，讓小精靈翻譯成分表給妳聽</p>

<div id="dropzone" class="border-2 border-dashed border-emerald-300 rounded-2xl p-12 text-center glass-card hover:border-emerald-500 transition-all cursor-pointer">

            <div id="uploadPrompt">

        </div>

            開始 AI 智慧分析
        </button>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="text-emerald-600 mt-4 font-medium animate-pulse">精靈正在讀取標籤中...</p>
