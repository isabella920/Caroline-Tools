<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營養小精靈 Nutrition Elf</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%2310b981%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2%22></path><path d=%22M7 2v20%22></path><path d=%22M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7%22></path></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #FDFBF7; } 
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #10b981; }
        
        /* 新增：API 彈窗背景 */
        .modal-overlay {  background: rgba(16, 185, 129, 0.1);  backdrop-filter: blur(8px); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex items-center justify-center">

<button onclick="toggleApiModal(true)" 
        class="fixed top-4 right-4 z-[9999] w-12 h-12 flex items-center justify-center rounded-full text-emerald-600 hover:bg-emerald-50 transition-all shadow-lg bg-white/90 backdrop-blur-sm border border-emerald-100">
    <i data-lucide="settings" class="w-7 h-7"></i>
</button>

    <a href="https://isabella920.github.io/Caroline-Tools/" 
       class="fixed top-4 left-4 z-[9999] w-10 h-10 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-emerald-600 transition-all shadow-sm bg-white/50 backdrop-blur-sm border border-white"
       title="←">
        <i data-lucide="arrow-left" class="w-6 h-6"></i>
    </a>    

    <div class="max-w-4xl w-full space-y-8"> 
        <header class="text-center space-y-4">
            <h1 class="text-3xl md:text-5xl font-extrabold text-emerald-800 flex items-center justify-center gap-3">
                <i data-lucide="utensils" class="text-emerald-500 w-8 h-8"></i> 營養小精靈
            </h1>
            <p class="text-gray-500 text-lg">拍照上傳，讓小精靈翻譯成分表給妳聽</p>
        </header>

        <div id="dropzone" class="border-2 border-dashed border-emerald-300 rounded-2xl p-12 text-center glass-card hover:border-emerald-500 transition-all cursor-pointer">
            <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
            <div id="uploadPrompt">
                <i data-lucide="camera" class="w-16 h-16 mx-auto text-emerald-400 mb-4"></i>
                <p class="text-2xl text-emerald-700 font-bold">點擊或拖放包裝照片</p>
                <p class="text-md text-gray-400 mt-2">支援多張照片同步分析</p>
            </div>
            <div id="previewContainer" class="flex flex-wrap justify-center gap-3 mt-4 hidden"></div>
        </div>

        <button id="analyzeBtn" class="w-full emerald-gradient text-white py-6 rounded-2xl text-2xl font-black shadow-lg active:scale-95 transition-transform disabled:opacity-50">
            開始 AI 智慧分析
        </button>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="text-emerald-600 mt-4 font-medium animate-pulse">精靈正在讀取標籤中...</p>
            <p class="text-xs text-gray-400">正在尋找隱藏的熱量地雷...</p>
        </div>

        <div id="resultCard" class="hidden">
            <div class="flex flex-col md:flex-row gap-6 items-start">
                <div class="hidden md:block md:w-1/3 space-y-4 sticky top-4">
                    <div class="glass-card rounded-2xl p-2 shadow-lg border border-white">
                        <img id="mainPreview" class="w-full h-auto rounded-xl object-contain bg-gray-100" src="" alt="產品原圖">
                    </div>
                    <p class="text-center text-gray-400 text-sm font-mono">產品原圖</p>
                </div>

                <div class="w-full md:w-2/3">
                    <div class="glass-card rounded-3xl p-6 md:p-10 shadow-2xl border border-white flex flex-col">
                        <div class="max-h-[65vh] md:max-h-[75vh] overflow-y-auto pr-2 space-y-6 custom-scrollbar">
                            <div class="flex justify-between items-center mb-6">
                                <h2 id="prodName" class="text-3xl font-black text-gray-800">產品名稱</h2>
                                <span id="verdictBadge" class="inline-flex items-center justify-center px-5 py-2 rounded-full text-sm font-black text-white shadow-md leading-none">評級</span>
                            </div>
                            <p id="verdictText" class="text-xl text-gray-600 italic mb-8 border-l-4 border-emerald-400 pl-4 py-2">"精靈短評"</p>
                            <div id="highlights" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                            <div class="space-y-4">
                                <h3 class="text-xl font-bold text-gray-700 flex items-center gap-2">
                                    <i data-lucide="languages" class="w-6 h-6"></i> 成分翻譯機
                                </h3>
                                <div id="translations" class="text-lg space-y-4 bg-white/50 p-6 rounded-xl"></div>
                            </div>
                            <div class="mt-8 pt-6 border-t border-gray-100 space-y-3 pb-4">
                                <p id="adviceTarget" class="text-lg font-bold text-emerald-700"></p>
                                <p id="adviceWarning" class="text-lg text-red-500 font-medium"></p>
                            </div>
                        </div>
                    </div>
                    <button id="downloadBtn" onclick="downloadImage()" class="w-full emerald-gradient text-white text-xl font-bold py-5 mt-4 rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.01] transition-all flex justify-center items-center gap-3">
                        <i data-lucide="image-down" class="w-6 h-6"></i> 下載分析圖卡分享
                    </button>
                    <button onclick="window.location.reload()" class="w-full text-gray-400 text-sm font-mono py-6 rounded-xl transition-all duration-300 tracking-widest uppercase hover:bg-gray-100 hover:text-emerald-600 group">
                        <span class="opacity-70 group-hover:opacity-100">重新掃描下一個</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="apiModal" class="fixed inset-0 z-[10000] flex items-center justify-center hidden">
        <div class="absolute inset-0 modal-overlay" onclick="toggleApiModal(false)"></div>
        <div class="relative w-[90%] max-w-md bg-[#FDFBF7] p-8 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-white">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="settings" class="w-5 h-5 text-emerald-600"></i> 設定 API Key
                </h3>
                <button onclick="toggleApiModal(false)" class="text-gray-400 hover:text-white transition-colors">✕</button>
            </div>
            <p class="text-gray-400 text-sm mb-6 leading-relaxed">請輸入您的 Google Gemini API Key。您的 Key 僅會儲存在瀏覽器中，不會傳送至其他伺服器。</p>
            
            <div class="relative mb-8">
                <input type="password" id="apiKeyInput" placeholder="貼上您的 API Key" 
class="w-full bg-white border-2 border-emerald-50 rounded-2xl py-5 px-6 text-emerald-900 focus:outline-none focus:border-emerald-400 transition-all shadow-inner">            </div>

<div class="flex gap-4">
    <button onclick="saveApiKey()" class="flex-1 emerald-gradient text-white font-bold py-5 rounded-2xl shadow-lg ...">儲存並啟用</button>
    
    <button onclick="clearApiKey()" class="px-6 bg-gray-100 text-gray-400 font-bold py-5 rounded-2xl hover:bg-red-50 hover:text-red-400 transition-all">清除</button>
</div>
            
            <a href="https://aistudio.google.com/app/apikey" target="_blank" class="block mt-8 text-center text-sm text-emerald-600/60 hover:text-emerald-600 transition-colors">取得 API Key ➜</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- API 管理區 (瀏覽器緩存) ---
        let API_KEY = localStorage.getItem('NUTRITION_ELF_KEY') || '';
        const MODEL_NAME = 'gemini-3-flash-preview'; 

        function toggleApiModal(show) {
            const modal = document.getElementById('apiModal');
            if (show) {
                modal.classList.remove('hidden');
                document.getElementById('apiKeyInput').value = API_KEY;
            } else {
                modal.classList.add('hidden');
            }
        }

        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if (!val) return alert('請先輸入 API Key！');
            localStorage.setItem('NUTRITION_ELF_KEY', val);
            API_KEY = val;
            alert('設定成功！精靈已就緒。');
            toggleApiModal(false);
        }

        function clearApiKey() {
            localStorage.removeItem('NUTRITION_ELF_KEY');
            API_KEY = '';
            document.getElementById('apiKeyInput').value = '';
            alert('已清除設定。');
        }

        // --- 原始邏輯保留 ---
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const previewContainer = document.getElementById('previewContainer');

        dropzone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            previewContainer.innerHTML = '';
            previewContainer.classList.remove('hidden');
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.className = "w-16 h-16 object-cover rounded-md shadow-sm border border-white";
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        };

        analyzeBtn.onclick = async () => {
            // 檢查是否設定了 API Key
            if (!API_KEY) {
                alert('請先點擊右上角齒輪設定 API Key 喔！');
                toggleApiModal(true);
                return;
            }

            const files = fileInput.files;
            if (files.length === 0) return alert('請先上傳照片喔！');

            document.getElementById('loading').classList.remove('hidden');
            analyzeBtn.classList.add('hidden');
            dropzone.classList.add('hidden');

            try {
                const imageParts = await Promise.all(
                    Array.from(files).map(async (file) => {
                        const base64 = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result.split(',')[1]);
                            reader.readAsDataURL(file);
                        });
                        return { inlineData: { mimeType: file.type, data: base64 } };
                    })
                );

                // 完全保留你原有的犀利指令 (Prompt)
                const prompt = `# 核心設定與生圖參數
Visual_Style: "Modern Infographic / High-Contrast Neon/ Sharp Details"
Lighting: "Soft Backlit (for food texture)"
Constraints: 
  - "Strict JSON output only (No Markdown backticks or prose outside JSON)"
  - "Comprehensive scanning: Must analyze 100% of visible or inferred ingredients"
  - "Tone: Witty, slightly sarcastic, yet empathetic to foodies"
  - "No [cite] tags in the final output"
  - "STRICT: Do not summarize. List EVERY single ingredient found or inferred."
  - "Exhaustive Mode: If there are 50 items, list 50 items."
  - "No Information Truncation: Never use 'etc.' or '...' in the JSON output."
  - "Parenthetical_Priority: If an ingredient has sub-items in parentheses (e.g., 'A(B, C)'), you MUST ignore 'A' and analyze ONLY 'B' and 'C'."
  - "Atomic_Extraction: Treat contents inside parentheses as the primary targets for analysis; bypass the outer general category name."

---
# 任務邏輯與內容 (Markdown 格式)

## 1. 角色定義 (Persona)

你是一位精通食品科學與人體代謝行為學的「毒舌營養吃貨小精靈」。你的風格是幽默、犀利且感同身受的（畢竟你也很愛吃），你的任務是無論使用者上傳的是否有標示，撕開食品的偽裝，讓追求健康卻又割捨不了美食的普通民眾（受眾），能明明白白地「墮落」。

## 2. 核心行動 (Act)
- 請深度掃描圖片中的所有文字資訊。若圖片為「成分表/營養標示」，請執行窮舉式分析
- 若僅為「食物外觀」而無標籤，請根據食材組成推論可能的隱藏添加物。
- 成分項目若有括弧補充，僅分析括弧內項目

### 掃描重點：
* **化學雷區**：人工色素、人工香料、各類防腐劑、增稠劑。
* **糖分陷阱**：高果糖玉米糖漿、代糖（如阿斯巴甜）對味覺的影響。
* **油脂真相**：氫化植物油、反式脂肪、棕櫚油。

## 3. 輸出結構 (Structure)
輸出必須為「純 JSON 格式」，內容包含：
{
  "productName": "產品名稱",
  "itemCount": "總共偵測到的物件數量 (確保此數字與列表長度相符)",
  "verdict": { 
    "title": "針對吃貨心態的一句話精闢吐槽（例如：這是實驗室產物，不是食物）", 
    "color": "green (安心吃) | yellow (考慮一下) | red (放下它)" 
  },
  "highlights": [
    { "label": "邪惡係數", "value": "0-10", "desc": "添加劑與加工程度的綜合評價", "type": "bad" },
    { "label": "熱量地雷", "value": "XXX kcal", "desc": "以運動量為比喻（例如：要跑 5 公里）", "type": "bad" }
  ],
  "translations": [
  // 這裡必須包含所有掃描到的項目，禁止只列前三項！
    { 
      "origin": "化學成分原名", 
      "simplified": "白話名稱", 
      "impact": "對身體或味覺的實際影響（例如：讓你的大腦對甜味麻木）" 
    }
  ],
  "advice": { 
    "warning": "這罐東西裡最違背天良的成分是什麼", 
    "action": "如果真的忍不住吃了，當天該如何補救（例如：多喝 1000cc 水或補充維他命 C）",
    "craving_swap": "給吃貨的靈魂建議：下次想吃這個時，有沒有更健康的美味替代品？"
  }`;

                const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...imageParts] }] })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(`🛑 偵測到問題：\n原因：${data.error.message}`);
                }

                // 修正：某些情況下 API 會回傳包含 Markdown 語法的字串，這裡做過濾
                let rawText = data.candidates[0].content.parts[0].text;
                const jsonMatch = rawText.match(/\{[\s\S]*\}/); // 尋找最外層的大括號
                if (jsonMatch) rawText = jsonMatch[0];

                const result = JSON.parse(rawText);
                renderResult(result);

            } catch (error) {
                alert(error.message);
                window.location.reload(); 
            }
        };

        function renderResult(res) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('resultCard').classList.remove('hidden');

            const firstImg = previewContainer.querySelector('img');
            if (firstImg && document.getElementById('mainPreview')) {
                document.getElementById('mainPreview').src = firstImg.src;
            }

            document.getElementById('prodName').innerText = res.productName;
            document.getElementById('verdictText').innerText = `"${res.verdict.title}"`;
            
            const badge = document.getElementById('verdictBadge');
            const colors = { green: 'bg-emerald-500', yellow: 'bg-amber-500', red: 'bg-red-500' };
            const colorKey = res.verdict.color.split(' ')[0].toLowerCase();
badge.className = `inline-flex items-center justify-center px-5 py-2 rounded-full text-sm font-black text-white shadow-md leading-none ${colors[colorKey] || 'bg-gray-500'}`;            badge.innerText = colorKey.toUpperCase();

            document.getElementById('highlights').innerHTML = res.highlights.map(h => `
                <div class="bg-white/70 p-5 rounded-2xl border border-white shadow-sm hover:shadow-md transition-shadow">
                    <p class="text-[12px] text-gray-400 font-bold uppercase tracking-widest">${h.label}</p>
                    <p class="text-2xl font-black text-emerald-900 my-1">${h.value}</p>
                    <p class="text-sm text-gray-500 leading-tight">${h.desc}</p>
                </div>
            `).join('');

            document.getElementById('translations').innerHTML = res.translations.map(t => `
                <div class="border-b border-emerald-50 last:border-0 pb-4 mb-4">
                    <div class="flex flex-wrap items-center gap-3">
                        <span class="text-xs font-mono text-gray-400 bg-gray-50 px-2 py-0.5 rounded">${t.origin}</span>
                        <span class="text-xl font-bold text-gray-700">➜ ${t.simplified}</span>
                    </div>
                    <p class="text-md text-emerald-600 mt-2 italic font-medium leading-relaxed">${t.impact}</p>
                </div>
            `).join('');

            document.getElementById('adviceTarget').innerHTML = `💡 靈魂替代：${res.advice.craving_swap}`;
            document.getElementById('adviceWarning').innerHTML = `⚠️ 補救動作：${res.advice.action}`;
            
            lucide.createIcons();
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
        }

        // 【新增】一鍵截圖並下載的魔法函式
        async function downloadImage() {
            const btn = document.getElementById('downloadBtn');
            const originalContent = btn.innerHTML;
            
            // 讓按鈕顯示轉圈圈，告知使用者正在處理
            btn.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i> 正在沖洗圖卡...`;
            lucide.createIcons();

            // 抓取整個包含分析結果的右側玻璃卡片
            const target = document.querySelector('.w-full.md\\:w-2\\/3 .glass-card');
            const scrollArea = target.querySelector('.custom-scrollbar');
            
            // 魔法步驟：暫時把「捲軸」限制拿掉，讓超長的成分表可以一次完整截圖！
            const originalMaxHeight = scrollArea.style.maxHeight;
            const originalOverflow = scrollArea.style.overflowY;
            scrollArea.style.maxHeight = 'none';
            scrollArea.style.overflowY = 'visible';

            try {
                // 呼叫攝影師拍照，設定背景色避免透明變成黑色，設定 scale=2 讓畫質變超清晰
                const canvas = await html2canvas(target, {
                    backgroundColor: '#FDFBF7',
                    scale: 2,
                    useCORS: true
                });

                // 把照片變成 PNG 檔案並觸發下載
                const link = document.createElement('a');
                link.download = `營養小精靈_分析結果.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                alert('截圖好像遇到一點干擾，請再試一次！');
            } finally {
                // 魔法步驟：把捲軸設定悄悄恢復原狀
                scrollArea.style.maxHeight = originalMaxHeight;
                scrollArea.style.overflowY = originalOverflow;
                // 恢復按鈕原本的樣子
                btn.innerHTML = originalContent;
                lucide.createIcons();
            }
        }
    </script>

    <div style="position: fixed; bottom: 10px; right: 20px; font-size: 10px; color: #94a3b8; font-family: monospace; pointer-events: none; z-index: 9999;">
        v1.4
    </div>
</body>
