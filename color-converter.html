    <style>
        /* --- 基礎變數與排版 --- */
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --accent-color: #3b82f6;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --current-h: 0;
            --current-s: 100%;
            --current-v: 100%;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            height: 720px;
            gap: 24px;
        }

        /* 面板設計 */
        .panel {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .left-panel { flex: 1; border-right: 1px solid var(--border-color); }
        .right-panel { flex: 1.2; }

        /* 預覽大方塊 */
        .preview-box {
            margin: 20px;
            height: 140px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }
        .preview-box:active { transform: scale(0.98); }
        .preview-hex {
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* 輸入區域樣式 */
        .input-stack {
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; }
        .input-wrapper {
            display: flex;
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent-color); background: #fff; }
        .input-field {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 12px;
            font-family: 'Inter', monospace;
            font-size: 0.85rem;
            outline: none;
        }
        .input-prefix {
            padding: 10px;
            background: #f1f5f9;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-right: 1px solid var(--border-color);
			width: 60px;       
			min-width: 60px;   
            text-align: center;
        }

        /* 歷史紀錄珍珠點 */

            padding: 16px 20px;

        .harmony-title-text { font-size: 0.8rem; font-weight: 600; color: var(--text-main); }
        .harmony-grid { display: flex; gap: 8px; }

            font-family: 'Inter',monospace;
			font-weight: 600;
            color: white;

        /* 色輪彈窗核心樣式 (採用 HSV 模型) */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center; justify-content: center;

        .overlay.active { display: flex; }
        .color-picker-card {
            background: white;
            width: 400px;
            border-radius: 16px;
            padding: 24px;

            width: 100%;

            border-radius: 8px;

            /* HSV 色塊背景：底層為色相，上層為飽和度白漸變與亮度黑漸變 */
            background: linear-gradient(to top, #000, transparent),

    <script>
        // --- 核心狀態管理 (改用 HSV) ---
        let state = { h: 0, s: 100, v: 100, history: [] };

        // 1. 擴展為完整的 Tailwind v3 色票庫 (50-900 全階層)
        const tailwindColors = [
            {n:'slate', h:['#f8fafc','#f1f5f9','#e2e8f0','#cbd5e1','#94a3b8','#64748b','#475569','#334155','#1e293b','#0f172a']},
            {n:'gray', h:['#f9fafb','#f3f4f6','#e5e7eb','#d1d5db','#9ca3af','#6b7280','#4b5563','#374151','#1f2937','#111827']},
            {n:'zinc', h:['#fafafa','#f4f4f5','#e4e4e7','#d4d4d8','#a1a1aa','#71717a','#52525b','#3f3f46','#27272a','#18181b']},
            {n:'neutral', h:['#fafafa','#f5f5f5','#e5e5e5','#d4d4d4','#a3a3a3','#737373','#525252','#404040','#262626','#171717']},
            {n:'stone', h:['#fafaf9','#f5f5f4','#e7e5e4','#d6d3d1','#a8a29e','#78716c','#57534e','#44403c','#292524','#1c1917']},
            {n:'red', h:['#fef2f2','#fee2e2','#fecaca','#fca5a5','#f87171','#ef4444','#dc2626','#b91c1c','#991b1b','#7f1d1d']},
            {n:'orange', h:['#fff7ed','#ffedd5','#fed7aa','#fdba74','#fb923c','#f97316','#ea580c','#c2410c','#9a3412','#7c2d12']},
            {n:'amber', h:['#fffbeb','#fef3c7','#fde68a','#fcd34d','#fbbf24','#f59e0b','#d97706','#b45309','#92400e','#78350f']},
            {n:'yellow', h:['#fefce8','#fef9c3','#fef08a','#fde047','#facc15','#eab308','#ca8a04','#a16207','#854d0e','#713f12']},
            {n:'lime', h:['#f7fee7','#ecfccb','#d9f99d','#bef264','#a3e635','#84cc16','#65a30d','#4d7c0f','#3f6212','#365314']},
            {n:'green', h:['#f0fdf4','#dcfce7','#bbf7d0','#86efac','#4ade80','#22c55e','#16a34a','#15803d','#166534','#14532d']},
            {n:'emerald', h:['#ecfdf5','#d1fae5','#a7f3d0','#6ee7b7','#34d399','#10b981','#059669','#047857','#065f46','#064e3b']},
            {n:'teal', h:['#f0fdfa','#ccfbf1','#99f6e4','#5eead4','#2dd4bf','#14b8a6','#0d9488','#0f766e','#115e59','#134e4a']},
            {n:'cyan', h:['#ecfeff','#cffafe','#a5f3fc','#67e8f9','#22d3ee','#06b6d4','#0891b2','#0e7490','#155e75','#164e63']},
            {n:'sky', h:['#f0f9ff','#e0f2fe','#bae6fd','#7dd3fc','#38bdf8','#0ea5e9','#0284c7','#0369a1','#075985','#0c4a6e']},
            {n:'blue', h:['#eff6ff','#dbeafe','#bfdbfe','#93c5fd','#60a5fa','#3b82f6','#2563eb','#1d4ed8','#1e40af','#1e3a8a']},
            {n:'indigo', h:['#eef2ff','#e0e7ff','#c7d2fe','#a5b4fc','#818cf8','#6366f1','#4f46e5','#4338ca','#3730a3','#312e81']},
            {n:'violet', h:['#f5f3ff','#ede9fe','#ddd6fe','#c4b5fd','#a78bfa','#8b5cf6','#7c3aed','#6d28d9','#5b21b6','#4c1d95']},
            {n:'purple', h:['#faf5ff','#f3e8ff','#e9d5ff','#d8b4fe','#c084fc','#a855f7','#9333ea','#7e22ce','#6b21a8','#581c87']},
            {n:'fuchsia', h:['#fdf4ff','#fae8ff','#f5d0fe','#f0abfc','#e879f9','#d946ef','#c026d3','#a21caf','#86198f','#701a75']},
            {n:'pink', h:['#fdf2f8','#fce7f3','#fbcfe8','#f9a8d4','#f472b6','#ec4899','#db2777','#be185d','#9d174d','#831843']},
            {n:'rose', h:['#fff1f2','#ffe4e6','#fecdd3','#fda4af','#fb7185','#f43f5e','#e11d48','#be123c','#9f1239','#881337']}
        ];


        // --- 核心轉換函數 ---
     
	 // HSV 轉 HSL 的橋樑
function hsvToHsl(h, s, v) {
    s /= 100; v /= 100;
    let l = v * (1 - s / 2);
    let sl = (l === 0 || l === 1) ? 0 : (v - l) / Math.min(l, 1 - l);
    return [h, Math.round(sl * 100), Math.round(l * 100)];
}

// HSL 直接轉 HEX
function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
    const rgb = [Math.round(255 * f(0)), Math.round(255 * f(8)), Math.round(255 * f(4))];
    return rgbToHex(...rgb);
}
	 
        // HSV to RGB (用於繪製與輸出)
        function hsvToRgb(h, s, v) {
            s /= 100; v /= 100;
            let r, g, b;
            let i = Math.floor(h / 60);
            let f = h / 60 - i;
            let p = v * (1 - s);
            let q = v * (1 - f * s);
            let t = v * (1 - (1 - f) * s);
            switch (i % 6) {
                case 0: r = v, g = t, b = p; break;
                case 1: r = q, g = v, b = p; break;
                case 2: r = p, g = v, b = t; break;
                case 3: r = p, g = q, b = v; break;
                case 4: r = t, g = p, b = v; break;
                case 5: r = v, g = p, b = q; break;
            }
            return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
        }

        // RGB to HSV (用於輸入同步)
        function rgbToHsv(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, v = max;
            let d = max - min;
            s = max === 0 ? 0 : d / max;
            if (max === min) h = 0;
            else {
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [Math.round(h * 360), Math.round(s * 100), Math.round(v * 100)];
        }

        // RGB to HSL (用於顯示 HSL 數值)
        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) h = s = 0;
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
        }

        function rgbToHex(r, g, b) { return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase(); }
        
        function hexToRgb(hex) {
            let c = hex.replace('#', '');
            if(c.length === 3) c = c.split('').map(x => x+x).join('');
            const n = parseInt(c, 16);
            return isNaN(n) ? [0,0,0] : [n >> 16, (n >> 8) & 255, n & 255];
        }

        function rgbToCmyk(r, g, b) {
            let c = 1 - (r / 255), m = 1 - (g / 255), y = 1 - (b / 255), k = Math.min(c, m, y);
            if (k === 1) return [0, 0, 0, 100];
            return [Math.round((c-k)/(1-k)*100), Math.round((m-k)/(1-k)*100), Math.round((y-k)/(1-k)*100), Math.round(k*100)];
        }

        function getClosestTailwind(r, g, b) {
            let min = Infinity, best = "blue-500";
            const shades = [50, 100, 200, 300, 400, 500, 600, 700, 800, 900];
            
            tailwindColors.forEach(colorGroup => {
                colorGroup.h.forEach((hex, index) => {
                    const trgb = hexToRgb(hex);
                    // 計算 R, G, B 的歐幾里得距離
                    const d = Math.sqrt((r-trgb[0])**2 + (g-trgb[1])**2 + (b-trgb[2])**2);
                    if(d < min) { 
                        min = d; 
                        best = `${colorGroup.n}-${shades[index]}`; 
                    }
                });
            });
            return best;
        }

        // --- UI 更新 ---
        function updateUI(source) {
            const rgb = hsvToRgb(state.h, state.s, state.v);
            const hex = rgbToHex(...rgb);
            const hsl = rgbToHsl(...rgb);
            const cmyk = rgbToCmyk(...rgb);
            const tw = getClosestTailwind(...rgb);

            // 更新 CSS 變數控制色輪背景
            document.documentElement.style.setProperty('--current-h', state.h);

            const canvas = document.getElementById('mainCanvas');
            canvas.style.backgroundColor = hex;
            document.getElementById('mainHexText').innerText = hex;

            // 左側輸入同步
            if(source !== 'inHex') document.getElementById('inHex').value = hex.replace('#','');
            if(source !== 'inRgb') document.getElementById('inRgb').value = rgb.join(', ');
            if(source !== 'inHsl') document.getElementById('inHsl').value = `${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%`;
			if(source !== 'inHsv') document.getElementById('inHsv').value =`${Math.round(state.h)}, ${Math.round(state.s)}%, ${Math.round(state.v)}%`;
            if(source !== 'inCmyk') document.getElementById('inCmyk').value = cmyk.join(', ');
            if(source !== 'inTw') document.getElementById('inTw').value = tw;

            // 彈窗取色點位置 (S 為 X, V 為 Y)
            const pointer = document.getElementById('slPointer');
            pointer.style.left = state.s + '%';
            pointer.style.top = (100 - state.v) + '%';
            document.getElementById('hueRange').value = state.h;

            // 彈窗輸入同步
            if(source !== 'pickHex') document.getElementById('pickHex').value = hex.replace('#','');
            if(source !== 'pickRgb') document.getElementById('pickRgb').value = rgb.join(', ');
            if(source !== 'pickHsl') document.getElementById('pickHsl').value = `${hsl[0]}, ${hsl[1]}%, ${hsl[2]}%`;
            if(source !== 'pickCMYK') document.getElementById('pickCMYK').value = cmyk;

            renderHarmonies();
        }

        function renderHarmonies() {
            const container = document.getElementById('harmonyContent');
            container.innerHTML = '';
            
            const schemes = [
                { title: '互補色 (Complementary)', steps: [0, 180] },
                { title: '類比色 (Analogous)', steps: [-30, 0, 30] },
                { title: '三等分 (Triadic)', steps: [0, 120, 240] },
                { title: '分割補色 (Split-Complementary)', steps: [0, 150, 210] },
                { title: '單色亮階 (Monochromatic)', steps: [-30, -15, 0, 15, 30], type: 'lightness' }
            ];


            schemes.forEach(s => {
                const sec = document.createElement('div');
                sec.className = 'harmony-section';
                sec.innerHTML = `<div class="harmony-title-text">${s.title}</div>`;
                const grid = document.createElement('div');
                grid.className = 'harmony-grid';

s.steps.forEach(step => {
    let nh = state.h, ns = state.s, nv = state.v;
    let bHex;

    // 關鍵修正：如果是要算「單色深淺」
    if(s.type === 'value' || s.type === 'lightness') {
        // 1. 先把目前的 HSV 轉成 HSL，因為 HSL 的亮度(L)才支援從黑到白
        let [hh, ss, ll] = hsvToHsl(state.h, state.s, state.v);
        
        // 2. 在 HSL 的空間裡調整「亮度」
        // step 為負會變深(#660000)，為正會變淺/粉紅(#FF9999)
        let nl = Math.max(0, Math.min(100, ll + step));
        
        // 3. 直接用 HSL 算出 HEX，這樣最準，不會卡死在 #FF0000
        bHex = hslToHex(hh, ss, nl);
    } else {
        // 正常的配色方案（互補、類比）：旋轉色相
        nh = (state.h + step + 360) % 360;
        bHex = rgbToHex(...hsvToRgb(nh, ns, nv));
    }

    // --- 渲染方塊 (保持原本的代碼) ---
    const box = document.createElement('div');
    box.className = `h-block ${step === 0 ? 'center' : ''}`;
    box.style.backgroundColor = bHex;
    box.innerHTML = `<span class="h-label">${bHex}</span>`;
    box.onclick = () => { 
        // 點擊色階時，將其轉回 HSV 存入 state，維持色輪運作
        const rgb = hexToRgb(bHex);
        const [h, s, v] = rgbToHsv(...rgb);
        state.h = h; state.s = s; state.v = v;
        updateUI(); 
		addHistory(bHex);
    };
    grid.appendChild(box);
});
                sec.appendChild(grid);
                container.appendChild(sec);
            });
        }

        // --- 交互邏輯 ---
        const slMap = document.getElementById('slMap');
        let isDragging = false;

        function handleSL(e) {
            const rect = slMap.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            // 邊界校正：確保 x, y 在容器內
            let x = Math.max(0, Math.min(rect.width, clientX - rect.left));
            let y = Math.max(0, Math.min(rect.height, clientY - rect.top));
            
            // HSV 映射：S 橫軸 0-100, V 縱軸 100-0
            state.s = Math.round((x / rect.width) * 100);
            state.v = Math.round(100 - (y / rect.height) * 100);
            
            updateUI('picker');
        }

        slMap.onmousedown = (e) => { isDragging = true; handleSL(e); };
        window.onmousemove = (e) => { if(isDragging) handleSL(e); };
        window.onmouseup = () => { isDragging = false; };

        slMap.addEventListener('touchstart', (e) => { isDragging = true; handleSL(e); e.preventDefault(); }, {passive: false});
        window.addEventListener('touchmove', (e) => { if(isDragging) handleSL(e); }, {passive: false});
        window.addEventListener('touchend', () => { isDragging = false; });

        document.getElementById('hueRange').oninput = (e) => {
            state.h = parseInt(e.target.value);
            updateUI('picker');
        };

        // 彈窗輸入聯動
        const pickInputs = ['pickHex', 'pickRgb', 'pickHsl', 'pickCMYK'];
        pickInputs.forEach(id => {
            document.getElementById(id).oninput = function() {
                let hsv;
                if(id === 'pickHex') hsv = rgbToHsv(...hexToRgb(this.value));
                else if(id === 'pickRgb') {
                    const p = this.value.split(',').map(n => parseInt(n.trim()));
                    if(p.length === 3) hsv = rgbToHsv(...p);
                }
                else if(id === 'pickHsl') {
                    // HSL 需轉回 RGB 再轉 HSV
                    const p = this.value.replace(/%/g, '').split(',').map(n => parseInt(n.trim()));
                    if(p.length === 3) {
                        const h=p[0], s=p[1]/100, l=p[2]/100;
                        const a = s * Math.min(l, 1 - l);
                        const f = n => l - a * Math.max(-1, Math.min((n + h / 30) % 12 - 3, Math.min(9 - (n + h / 30) % 12, 1)));
                        hsv = rgbToHsv(Math.round(255*f(0)), Math.round(255*f(8)), Math.round(255*f(4)));
                    }
                }
                if(hsv) { [state.h, state.s, state.v] = hsv; updateUI(id); }
            };
        });

        document.getElementById('mainCanvas').onclick = () => {
            document.getElementById('pickerOverlay').classList.add('active');
        };
        document.getElementById('closePicker').onclick = () => {
            document.getElementById('pickerOverlay').classList.remove('active');
            addHistory(rgbToHex(...hsvToRgb(state.h, state.s, state.v)));
        };

        // --- 歷史紀錄 ---
function addHistory(hex) {
    if (!hex) return;
    
    // 1. 統一轉成大寫並加上 # 號，確保比對基礎一致
    let cleanHex = hex.toUpperCase();
    if (!cleanHex.startsWith('#')) cleanHex = '#' + cleanHex;

    // 2. 檢查是否與「目前最新（第一顆）」的顏色重複
    // 如果點擊同一個顏色，或算出來的 HEX 沒變，就直接攔截
    if (state.history.length > 0 && state.history[0] === cleanHex) {
        return; 
    }

    // 3. 如果歷史紀錄中其他位置有這個顏色，先把它移除（搬移到最前面的邏輯）
    const index = state.history.indexOf(cleanHex);
    if (index > -1) {
        state.history.splice(index, 1);
    }

    // 4. 加入最前面並限制數量
    state.history.unshift(cleanHex);
    if (state.history.length > 14) state.history.pop();

    renderHistory();
}

function renderHistory() {
    const bar = document.getElementById('historyBar');
    if (!bar) return;
    bar.innerHTML = '';
    state.history.forEach(h => {
        const p = document.createElement('div');
        p.className = 'pearl';
        p.style.backgroundColor = h;
        p.title = h;
        // 點擊珍珠點回填顏色
        p.onclick = () => {
            const rgb = hexToRgb(h);
            const [h_new, s_new, v_new] = rgbToHsv(...rgb);
            state.h = h_new; state.s = s_new; state.v = v_new;
            updateUI('history'); // 標記來源為 history 避免迴圈
        };
        bar.appendChild(p);
    });
}

        const inputs = ['inHex', 'inRgb', 'inHsl','inHsv', 'inCmyk', 'inTw'];
        inputs.forEach(id => {
            document.getElementById(id).onclick = function() {
                this.select();
                document.execCommand('copy');
                const t = document.getElementById('toast');
                t.classList.add('show');
                setTimeout(()=>t.classList.remove('show'), 1500);
                if(id === 'inHex') addHistory('#' + this.value);
            };
        });

        updateUI();
		lucide.createIcons();
    </script>
